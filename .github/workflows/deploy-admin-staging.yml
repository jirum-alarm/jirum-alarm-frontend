name: deploy-admin-staging

on:
  push:
    branches:
      - main
    paths:
      - "apps/admin/**"
      - "packages/**"

jobs:
  build:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    env:
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      DOCKER_REPOSITORY: ${{ secrets.DOCKER_USER }}/jirum-alarm-admin-dev
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      INFRA_GITHUB_REPOSITORY: ${{ secrets.INFRA_GITHUB_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # with:
        # version: 8

      - name: Get version
        id: image
        run: |
          VERSION=$(echo ${{ github.sha }} | cut -c1-8)
          echo VERSION=$VERSION
          echo "::set-output name=version::$VERSION"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install packages
        run: pnpm install

      - name: Docker private registry setting
        run: |
          echo $DOCKER_PASSWORD | docker login $DOCKER_REGISTRY -u $DOCKER_USER --password-stdin

      - name: Build Image & Push Image
        run: |
          docker build -t $DOCKER_REGISTRY/$DOCKER_REPOSITORY:$IMAGE_TAG -f apps/admin/deploy/development/Dockerfile .
          docker tag $DOCKER_REGISTRY/$DOCKER_REPOSITORY:$IMAGE_TAG $DOCKER_REGISTRY/$DOCKER_REPOSITORY:develop
          docker push $DOCKER_REGISTRY/$DOCKER_REPOSITORY:$IMAGE_TAG
          docker push $DOCKER_REGISTRY/$DOCKER_REPOSITORY:develop
          echo "::set-output name=image::$DOCKER_REGISTRY/$DOCKER_REPOSITORY:$IMAGE_TAG"
        env:
          IMAGE_TAG: ${{ steps.image.outputs.version }}

      - name: Checkout kubernetes infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_GITHUB_REPOSITORY }}
          ref: main
          token: ${{ secrets.ACTION_TOKEN }}
          path: infra

      - name: Install yq
        run: |
          set -euo pipefail
          YQ_VERSION="v4.44.3"
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update Kubernetes manifest
        working-directory: infra
        env:
          NEW_TAG: ${{ steps.image.outputs.version }}
        run: |
          set -euo pipefail
          # kustomize overlay 의 images[].newTag 한 곳만 갱신한다.
          # (이전: server/.../deployment.yaml 직접 치환 — 인프라 마이그레이션으로 사라진 죽은 경로)
          KUSTOMIZATION="apps/frontend-admin/overlays/development/kustomization.yaml"
          IMAGE_NAME="harbor.kyojs.com/tjsry0466/jirum-alarm-admin"
          export IMAGE_NAME NEW_TAG
          yq eval -i '(.images[] | select(.name == strenv(IMAGE_NAME)) | .newTag) = strenv(NEW_TAG)' "$KUSTOMIZATION"

      - name: Validate Kubernetes manifest
        working-directory: infra
        run: |
          set -euo pipefail
          yq eval '.' apps/frontend-admin/overlays/development/kustomization.yaml > /dev/null

      - name: Commit files
        working-directory: infra
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add .
          git commit -am "Update image tag"
          git push -u origin main

      - name: action-slack
        uses: 8398a7/action-slack@v3
        continue-on-error: true
        with:
          status: ${{ job.status }}
          author_name: Github Bot (Development)
          fields: repo,message
          if_mention: success,failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
