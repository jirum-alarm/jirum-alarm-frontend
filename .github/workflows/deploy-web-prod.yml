name: deploy-web-prod

on:
  push:
    tags:
      - "v*.*.*"
    paths:
      - "apps/web/**"
      - "packages/**"

concurrency:
  group: production-deployment
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USER }}/jirum-alarm-frontend-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Jirum Alarm Web Frontend
            org.opencontainers.image.description=Production deployment
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            maintainer=${{ github.repository_owner }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/deploy/production/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SERVICE_URL=${{ vars.NEXT_PUBLIC_SERVICE_URL }}
            NEXT_PUBLIC_ADSENSE_CLIENT_ID=ca-pub-3855723530036909
            NEXT_PUBLIC_ADSENSE_SLOT_PRODUCT_DETAIL=9763036455
            NEXT_PUBLIC_ADSENSE_SLOT_SEARCH_INFEED=1939286674
            NEXT_PUBLIC_ADSENSE_SLOT_PRODUCT_DETAIL_SIDE=2933904228
            API_URL=${{ vars.API_URL }}
            NODE_ENV=${{ vars.NODE_ENV }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USER }}/jirum-alarm-frontend-web:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://jirum-alarm.com
    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.INFRA_GITHUB_REPOSITORY }}
          ref: main
          token: ${{ secrets.ACTION_TOKEN }}
          path: infra

      - name: Install yq
        run: |
          set -euo pipefail
          YQ_VERSION="v4.44.3"
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update Kubernetes manifest
        working-directory: infra
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          set -euo pipefail
          # kustomize overlay 의 images[].newTag 한 곳만 갱신한다.
          # (이전: server/.../deployment.yaml 의 image 라인 직접 치환 — 더는 ArgoCD 가 보지 않는 경로)
          # semver 태그라 매 배포마다 값이 달라져 ArgoCD 가 자연 rollout (어노테이션 트릭 불필요).
          KUSTOMIZATION="apps/frontend-web/overlays/production/kustomization.yaml"
          IMAGE_NAME="${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USER }}/jirum-alarm-frontend-web"
          export IMAGE_NAME NEW_TAG
          yq eval -i '(.images[] | select(.name == strenv(IMAGE_NAME)) | .newTag) = strenv(NEW_TAG)' "$KUSTOMIZATION"

      - name: Validate Kubernetes manifest
        working-directory: infra
        run: |
          set -euo pipefail
          yq eval '.' apps/frontend-web/overlays/production/kustomization.yaml > /dev/null

      - name: Commit files
        working-directory: infra
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add .
          git commit -am "Update image tag"
          git push -u origin main
