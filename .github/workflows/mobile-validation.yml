name: mobile-validation

on:
  pull_request:
    paths:
      - .github/workflows/mobile-validation.yml
      - .npmrc
      - .nvmrc
      - apps/mobile/**
      - apps/web/src/app/actions/agent.ts
      - apps/web/src/shared/model/device.ts
      - apps/web/src/shared/hooks/useAppDownloadLink.tsx
      - apps/landing/src/app/components/key-visual/AppDownload.tsx
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
  push:
    paths:
      - .github/workflows/mobile-validation.yml
      - .npmrc
      - .nvmrc
      - apps/mobile/**
      - apps/web/src/app/actions/agent.ts
      - apps/web/src/shared/model/device.ts
      - apps/web/src/shared/hooks/useAppDownloadLink.tsx
      - apps/landing/src/app/components/key-visual/AppDownload.tsx
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json

permissions:
  contents: read

env:
  NODE_VERSION: 22.18.0
  PNPM_VERSION: 10.30.3

jobs:
  mobile-js-validation:
    name: Mobile JS Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Run mobile JS validation
        run: pnpm verify:mobile

  mobile-ios-smoke:
    name: Mobile iOS Smoke
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Check iOS secret availability
        id: ios-secrets
        env:
          MOBILE_IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.MOBILE_IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
        run: |
          set -euo pipefail

          if [ -n "${MOBILE_IOS_GOOGLE_SERVICE_INFO_PLIST_B64}" ]; then
            printf 'ready=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'ready=false\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' '::notice::Skipping iOS smoke build because required secrets are unavailable. This is expected for forked pull requests.'

      - name: Restore iOS local secrets
        if: steps.ios-secrets.outputs.ready == 'true'
        working-directory: apps/mobile
        env:
          MOBILE_IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.MOBILE_IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
        run: |
          set -euo pipefail
          umask 077
          node -e "const fs=require('fs');fs.writeFileSync('ios/GoogleService-Info.plist',Buffer.from(process.env.MOBILE_IOS_GOOGLE_SERVICE_INFO_PLIST_B64,'base64'))"

      - name: Install iOS Bundler dependencies
        if: steps.ios-secrets.outputs.ready == 'true'
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Install CocoaPods
        if: steps.ios-secrets.outputs.ready == 'true'
        working-directory: apps/mobile
        run: bundle exec pod install --project-directory=ios

      - name: Run iOS smoke build
        if: steps.ios-secrets.outputs.ready == 'true'
        run: pnpm --filter mobile run build:ios:debug:sim

      - name: Clean restored iOS secrets
        if: always() && steps.ios-secrets.outputs.ready == 'true'
        working-directory: apps/mobile
        run: rm -f ios/GoogleService-Info.plist

  mobile-android-smoke:
    name: Mobile Android Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Check Android secret availability
        id: android-secrets
        env:
          MOBILE_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.MOBILE_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set -euo pipefail

          if [ -n "${MOBILE_ANDROID_GOOGLE_SERVICES_JSON_B64}" ]; then
            printf 'ready=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'ready=false\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' '::notice::Skipping Android smoke build because `MOBILE_ANDROID_GOOGLE_SERVICES_JSON_B64` is unavailable. This is expected for forked pull requests.'

      - name: Restore Android local secrets
        if: steps.android-secrets.outputs.ready == 'true'
        working-directory: apps/mobile
        env:
          MOBILE_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.MOBILE_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set -euo pipefail
          umask 077
          node -e "const fs=require('fs');fs.writeFileSync('android/app/google-services.json',Buffer.from(process.env.MOBILE_ANDROID_GOOGLE_SERVICES_JSON_B64,'base64'))"

      - name: Generate Android debug keystore
        if: steps.android-secrets.outputs.ready == 'true'
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          keytool -genkeypair -v -storetype PKCS12 -keystore android/app/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Run Android smoke build
        if: steps.android-secrets.outputs.ready == 'true'
        run: pnpm --filter mobile run build:android:debug

      - name: Clean restored Android secrets
        if: always() && steps.android-secrets.outputs.ready == 'true'
        working-directory: apps/mobile
        run: rm -f android/app/google-services.json android/app/debug.keystore
